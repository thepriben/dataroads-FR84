name: Update OSM GeoJSON

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update GeoJSON
        run: python3 scripts/update_osm_geojson.py
      - name: Commit changes
        run: |
          if git diff --quiet -- data/osm; then
            echo "No GeoJSON changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/osm
          git commit -m "Update OSM GeoJSON"
          git push
